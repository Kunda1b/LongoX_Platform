global:
  environment: production
  imageRegistry: ghcr.io/longox
  imageTag: latest

image:
  repository: search-service
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: ""

podSecurityContext:
  fsGroup: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 3011
  metricsPort: 9090

config:
  logLevel: info
  apiPrefix: /api/v1
  extraConfig:
    SEARCH_INDEX_BUFFER_SIZE: 100
    SEARCH_RESULTS_MAX: 100
    SEARCH_INDEX_REFRESH_INTERVAL_MS: 5000
    SEARCH_ENGINE: meilisearch

extraEnv:
  NODE_ENV: production

externalSecret:
  enabled: true
  storeName: aws-secrets-manager
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  name: search-service-secrets
  keys:
    MEILISEARCH_API_KEY: longox/${environment}/meilisearch-api-key
    MEILISEARCH_HOST: longox/${environment}/meilisearch-host
    ELASTICSEARCH_URL: longox/${environment}/elasticsearch-url
    REDIS_URL: longox/${environment}/redis-url
    DATABASE_URL: longox/${environment}/database-url

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

nodeSelector:
  nodegroup-type: on-demand

pdb:
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 15s
  path: /metrics
  prometheusRelease: kube-prometheus-stack

terminationGracePeriodSeconds: 60
