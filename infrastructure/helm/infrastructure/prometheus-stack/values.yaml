kube-prometheus-stack:
  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['namespace', 'severity']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: default
        routes:
          - match:
              severity: critical
            receiver: critical
            continue: true
          - match:
              severity: warning
            receiver: warning
      receivers:
        - name: default
          email_configs:
            - to: devops@longox.io
              send_resolved: true
        - name: critical
          email_configs:
            - to: devops@longox.io
              send_resolved: true
        - name: warning
          email_configs:
            - to: devops@longox.io

    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 200m
          memory: 512Mi

  grafana:
    enabled: true
    defaultDashboardsEnabled: true
    adminPassword: ""
    persistence:
      enabled: true
      size: 10Gi
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts: ["grafana.longox.io"]
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
      - name: Tempo
        type: tempo
        url: http://tempo:3100
        access: proxy
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: longox
            orgId: 1
            folder: LongoX
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/longox
    dashboardsConfigMaps:
      longox: longox-dashboards
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  prometheus:
    prometheusSpec:
      retention: 30d
      retentionSize: 50GB
      scrapeInterval: 15s
      evaluationInterval: 15s
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: 1
          memory: 4Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      enableAdminAPI: false
      walCompression: true
      nodeSelector:
        nodegroup-type: on-demand
      tolerations:
        - key: dedicated
          operator: Equal
          value: monitoring
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway

  kubeStateMetrics:
    enabled: true

  nodeExporter:
    enabled: true

  prometheusOperator:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi
    admissionWebhooks:
      enabled: true
      patch:
        enabled: true
