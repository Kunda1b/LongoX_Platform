apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.global.environment | default "production" | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | default "info" | quote }}
  API_PREFIX: {{ .Values.config.apiPrefix | default "/api/v1" | quote }}
  PORT: {{ .Values.service.targetPort | toString | quote }}
  {{- if .Values.config.extraConfig }}
  {{- toYaml .Values.config.extraConfig | nindent 2 }}
  {{- end }}
