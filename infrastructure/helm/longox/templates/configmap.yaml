apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.apiGateway.name }}-config
  labels:
    app: {{ .Values.apiGateway.name }}
    {{- include "longox.labels" $ | nindent 4 }}
data:
  NODE_ENV: {{ .Values.global.environment | quote }}
  LOG_LEVEL: {{ .Values.apiGateway.env.LOG_LEVEL | default "info" | quote }}
  API_PREFIX: {{ .Values.apiGateway.env.API_PREFIX | default "/api/v1" | quote }}
  PORT: {{ .Values.apiGateway.service.targetPort | toString | quote }}
