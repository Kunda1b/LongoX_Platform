{{- if .Values.apiGateway.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Values.apiGateway.name }}-pdb
  labels:
    app: {{ .Values.apiGateway.name }}
    {{- include "longox.labels" $ | nindent 4 }}
spec:
  minAvailable: {{ .Values.apiGateway.pdb.minAvailable | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.apiGateway.name }}
---
{{- end }}
