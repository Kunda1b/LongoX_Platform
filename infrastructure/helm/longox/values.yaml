global:
  environment: production
  imageRegistry: ""
  imageTag: latest

apiGateway:
  name: api-gateway
  replicaCount: 2
  image:
    repository: longox/api-gateway
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 3001
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  env:
    NODE_ENV: production
    LOG_LEVEL: info
    API_PREFIX: /api/v1

