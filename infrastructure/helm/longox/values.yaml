ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: app.longox.io
      paths:
        - path: /
          pathType: Prefix
    - host: api.longox.io
      paths:
        - path: /api
          pathType: Prefix

postgresql:
  enabled: true
  auth:
    database: longox
    username: longox_admin
  primary:
    persistence:
      size: 50Gi
    resources:
      requests:
        memory: 2Gi
        cpu: 500m

redis:
  enabled: true
  architecture: replication
  auth:
    enabled: true
  master:
    persistence:
      size: 10Gi
  replica:
    replicaCount: 2
    persistence:
      size: 10Gi

monitoring:
  enabled: true
  grafana:
    adminPassword: ""
  prometheus:
    retentionDays: 30
