{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "chart.fullname" . }}-secrets
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName | default "aws-secrets-manager" }}
    kind: {{ .Values.externalSecret.storeKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "chart.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    {{- range $key, $ref := .Values.externalSecret.keys }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $ref }}
    {{- end }}
{{- end }}
