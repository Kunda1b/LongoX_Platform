global:
  environment: production
  imageRegistry: ghcr.io/longox
  imageTag: latest

image:
  repository: compliance-service
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: ""

podSecurityContext:
  fsGroup: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 3008
  metricsPort: 9090

config:
  logLevel: info
  apiPrefix: /api/v1
  extraConfig:
    AUDIT_RETENTION_DAYS: 2555
    COMPLIANCE_CHECK_INTERVAL_MS: 3600000
    AUDIT_LOG_LEVEL: info

extraEnv:
  NODE_ENV: production

externalSecret:
  enabled: true
  storeName: aws-secrets-manager
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  name: compliance-service-secrets
  keys:
    S3_AUDIT_BUCKET: longox/${environment}/s3-audit-bucket
    DATABASE_URL: longox/${environment}/database-url
    KMS_KEY_ID: longox/${environment}/kms-key-id

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

nodeSelector:
  nodegroup-type: on-demand

pdb:
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 15s
  path: /metrics
  prometheusRelease: kube-prometheus-stack

terminationGracePeriodSeconds: 60
