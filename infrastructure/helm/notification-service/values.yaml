global:
  environment: production
  imageRegistry: ghcr.io/longox
  imageTag: latest

image:
  repository: notification-service
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: ""

podSecurityContext:
  fsGroup: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 3009
  metricsPort: 9090

config:
  logLevel: info
  apiPrefix: /api/v1
  extraConfig:
    PUSH_ENABLED: true
    NOTIFICATION_BATCH_SIZE: 100
    SMTP_PORT: 587
    EMAIL_FROM: noreply@longox.io
    NOTIFICATION_INTERVAL_MS: 5000

extraEnv:
  NODE_ENV: production

externalSecret:
  enabled: true
  storeName: aws-secrets-manager
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  name: notification-service-secrets
  keys:
    APNS_KEY: longox/${environment}/apns-key
    SMTP_USER: longox/${environment}/smtp-user
    DATABASE_URL: longox/${environment}/database-url
    SES_SECRET_KEY: longox/${environment}/ses-secret-key
    SES_ACCESS_KEY: longox/${environment}/ses-access-key
    FCM_API_KEY: longox/${environment}/fcm-api-key
    SMTP_PASS: longox/${environment}/smtp-pass
    REDIS_URL: longox/${environment}/redis-url

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

nodeSelector:
  nodegroup-type: on-demand

pdb:
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 15s
  path: /metrics
  prometheusRelease: kube-prometheus-stack

terminationGracePeriodSeconds: 60
