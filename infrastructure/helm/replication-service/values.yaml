global:
  environment: production
  imageRegistry: ghcr.io/longox
  imageTag: latest

image:
  repository: replication-service
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: ""

podSecurityContext:
  fsGroup: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 3010
  metricsPort: 9090

config:
  logLevel: info
  apiPrefix: /api/v1
  extraConfig:
    REPLICATION_INTERVAL_MS: 10000
    REPLICATION_RETENTION_HOURS: 168
    REPLICATION_BATCH_SIZE: 1000
    REPLICATION_MAX_RETRIES: 5

extraEnv:
  NODE_ENV: production

externalSecret:
  enabled: true
  storeName: aws-secrets-manager
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  name: replication-service-secrets
  keys:
    S3_REPLICATION_BUCKET: longox/${environment}/s3-replication-bucket
    REDIS_URL: longox/${environment}/redis-url
    DATABASE_URL: longox/${environment}/database-url

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

nodeSelector:
  nodegroup-type: on-demand

pdb:
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 15s
  path: /metrics
  prometheusRelease: kube-prometheus-stack

crd:
  enabled: true

controller:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  nodeSelector:
    nodegroup-type: on-demand

worker:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi
  nodeSelector:
    nodegroup-type: spot

terminationGracePeriodSeconds: 60
