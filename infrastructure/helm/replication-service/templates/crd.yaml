{{- if .Values.crd.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenantreplications.longox.io
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  group: longox.io
  names:
    kind: TenantReplication
    listKind: TenantReplicationList
    plural: tenantreplications
    singular: tenantreplication
    shortNames:
      - tr
      - trepl
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                sourceTenant:
                  type: string
                targetTenant:
                  type: string
                resources:
                  type: array
                  items:
                    type: string
                    enum:
                      - workflows
                      - templates
                      - connectors
                      - executions
                      - all
                schedule:
                  type: string
                retention:
                  type: integer
                  minimum: 1
                  maximum: 8760
                namespaceScope:
                  type: boolean
              required:
                - sourceTenant
                - targetTenant
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Completed
                    - Failed
                lastReplication:
                  type: string
                  format: date-time
                nextReplication:
                  type: string
                  format: date-time
                replicasCompleted:
                  type: integer
                bytesTransferred:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Source
          type: string
          jsonPath: .spec.sourceTenant
        - name: Target
          type: string
          jsonPath: .spec.targetTenant
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
