apiVersion: v2
name: autoflow
description: Helm chart for Flow Builder Nexus platform
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - workflow
  - automation
  - low-code
dependencies:
  - name: postgresql
    version: 15.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 19.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
