{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chart.fullname" . }}-migration
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      serviceAccountName: {{ include "chart.fullname" . }}
      restartPolicy: Never
      containers:
        - name: migration
          image: "{{ include "chart.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          command: ["node", "dist/migrate.js"]
          envFrom:
            - configMapRef:
                name: {{ include "chart.fullname" . }}
            - secretRef:
                name: {{ .Values.externalSecret.name | default (printf "%s-secrets" (include "chart.fullname" .)) }}
                optional: true
          env:
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: SERVICE_ROLE
              value: migration
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
  backoffLimit: {{ .Values.migration.backoffLimit | default 3 }}
{{- end }}
