apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform-control

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/0
        value:
          name: NODE_ENV
          value: "development"

images:
  - name: autoflow/api-gateway
    newTag: develop
  - name: autoflow/execution-service
    newTag: develop
