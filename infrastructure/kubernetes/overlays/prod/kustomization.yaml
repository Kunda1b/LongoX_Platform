apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform-control

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: METRICS_ENABLED
          value: "true"
      - op: replace
        path: /spec/template/spec/containers/0/env/0
        value:
          name: NODE_ENV
          value: "production"

images:
  - name: longox/api-gateway
    newTag: production
  - name: longox/execution-service
    newTag: production
