# ─── PodDisruptionBudgets for every service Deployment ──────────────────────
#
# Architecture §11.x — every long-running Deployment must have a PDB so that
# voluntary disruptions (node drain, cluster autoscaler, rolling updates) can't
# take all replicas offline at once. minAvailable: 1 ensures at least one pod
# stays serving traffic during the disruption.
#
# This manifest covers the deployments that live under
# `infrastructure/kubernetes/base/`. Services deployed via the umbrella Helm
# chart (`infrastructure/helm/longox/templates/pdb.yaml`) have their own PDBs
# generated from values.yaml; the manifest below is the canonical plain-YAML
# fallback for environments that deploy via kustomize (overlays/dev,
# overlays/staging, overlays/prod) instead of Helm.
#
# Per-deployment PDBs are listed with `---` document separators so they can
# be split/filtered by kustomize if a particular overlay wants to override
# just one.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: platform-control
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: longox
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
