# ─── ADR §21.2: Queue-depth HPA via BullMQ metrics adapter ──────────────────
# This HPA template scales services based on BullMQ queue depth.
# Requires the BullMQ Prometheus metrics adapter to be installed:
#   https://github.com/Zooz/prometheus-adapter
#
# The adapter exposes metrics like:
#   bullmq_queue_waiting{queue="workflow-execution"} 42
#   bullmq_queue_active{queue="ai-run"} 7
#
# Apply per-service by setting the queue name and target value.
#
# ─── matrix item 32 — Memory-based scaling ─────────────────────────────────
# Every HPA in this file includes a `memory` Resource metric in addition to
# the queue-depth and CPU metrics. Memory pressure is the leading indicator
# for OOMKill in long-running Node.js workers (V8 heap growth, retention of
# large workflow payloads in memory); scaling on memory prevents the worker
# from being killed by the kubelet before CPU/queue metrics catch up. The
# memory threshold is intentionally lower than the CPU threshold (75% vs
# 70%) because memory pressure is asymmetric — once a pod is OOMKilled, in-
# flight work is lost, whereas brief CPU spikes just slow down throughput.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: execution-service-queue-hpa
  namespace: platform-execution
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: execution-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: External
      external:
        metric:
          name: bullmq_queue_waiting
          selector:
            matchLabels:
              queue: workflow-execution
        target:
          type: AverageValue
          averageValue: "10"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75  # matrix item 32 — memory-based scaling
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-queue-hpa
  namespace: platform-execution
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: External
      external:
        metric:
          name: bullmq_queue_waiting
          selector:
            matchLabels:
              queue: ai-run
        target:
          type: AverageValue
          averageValue: "5"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75  # matrix item 32 — memory-based scaling
