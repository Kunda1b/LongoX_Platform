apiVersion: v1
kind: ConfigMap
metadata:
  name: longox-config
  namespace: platform-control
data:
  API_PREFIX: "/api/v1"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "https://app.longox.io"
  JWT_EXPIRY: "24h"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: longox-config
  namespace: platform-execution
data:
  LOG_LEVEL: "info"
  WORKER_CONCURRENCY: "5"
  MAX_RETRY_ATTEMPTS: "3"
