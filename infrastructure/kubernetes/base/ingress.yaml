apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longox-ingress
  namespace: platform-control
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.flowbuilder.io
      secretName: longox-tls
  rules:
    - host: api.flowbuilder.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longox-webhook-ingress
  namespace: platform-execution
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - webhooks.flowbuilder.io
      secretName: webhook-tls
  rules:
    - host: webhooks.flowbuilder.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: execution-worker
                port:
                  number: 80
