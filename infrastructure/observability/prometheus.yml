global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "longox-api-gateway"
    static_configs:
      - targets: ["api-gateway:9090"]
    metrics_path: /metrics

  - job_name: "longox-execution-worker"
    static_configs:
      - targets: ["execution-worker:9090"]
    metrics_path: /metrics

  - job_name: "longox-otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: /metrics

  - job_name: "longox-prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: /metrics
