_format_version: "3.0"
_transform: true

# ─── Kong DB-less Declarative Config ────────────────────────────────────────────
# DB-less GitOps: this file is the single source of truth for Kong routing.
# Load with: KONG_DATABASE=off KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yaml kong start
# Dev:        docker compose -f infrastructure/kong/docker-compose.dev.yml up
#
# All traffic enters Kong on :8000 (proxy) and is routed to the api-gateway
# upstream. Kong applies plugins before forwarding:
#   1. correlation-id    — inject x-correlation-id into every request
#   2. request-id        — Kong-generated request ID
#   3. http-log          — structured request logging to stdout
#   4. prometheus         — Prometheus /metrics at :8001/metrics
#   5. rate-limiting     — per-consumer + per-IP limits
#   6. jwt               — validate Bearer tokens (public routes excluded)
#
# Versioned routing: all paths prefixed /api/v1/ are preserved; legacy /api/
# paths are rewritten to /api/v1/ via the request-transformer plugin.

# ─── Upstreams ───────────────────────────────────────────────────────────────────

upstreams:
  - name: api-gateway-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /healthz
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
      passive:
        healthy:
          successes: 5
        unhealthy:
          http_failures: 3
    targets:
      - target: api-gateway:3000
        weight: 100

# ─── Services ────────────────────────────────────────────────────────────────────

services:
  # ── API Gateway (all traffic) ─────────────────────────────────────────────────
  - name: api-gateway
    host: api-gateway-upstream
    port: 3000
    protocol: http
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    retries: 2

    routes:
      # ── Public: Auth ──────────────────────────────────────────────────────────
      - name: auth-public
        paths:
          - /api/v1/auth/login
          - /api/v1/auth/register
          - /api/v1/auth/logout
          - /api/v1/auth/refresh
          - /api/v1/auth/verify-email
          - /api/v1/auth/forgot-password
          - /api/v1/auth/reset-password
          - /api/v1/auth/workos
          - /api/v1/auth/sso
          - /api/v1/auth/mfa
          - /auth/login
          - /auth/register
          - /auth/logout
          - /auth/refresh
          - /auth/verify-email
          - /auth/forgot-password
          - /auth/reset-password
          - /auth/workos
          - /auth/sso
          - /auth/mfa
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              hour: 300
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: ip
              hide_client_headers: false

      # ── Public: SCIM Directory Sync ───────────────────────────────────────────
      - name: scim-webhook
        paths:
          - /auth/scim
        strip_path: false
        methods: [POST]
        plugins:
          - name: rate-limiting
            config:
              minute: 60
              policy: redis
              redis_host: redis
              redis_port: 6379

      # ── Public: Stripe Webhook ────────────────────────────────────────────────
      - name: stripe-webhook
        paths:
          - /billing/webhook
          - /api/billing/webhook
        strip_path: false
        methods: [POST]

      # ── Public: Health ────────────────────────────────────────────────────────
      - name: health
        paths:
          - /healthz
          - /api/healthz
        strip_path: false
        methods: [GET]

      # ── Protected: Workflows ──────────────────────────────────────────────────
      - name: workflows
        paths:
          - ~^/api/v1/workflows
          - ~^/api/workflows
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]
          - name: rate-limiting
            config:
              minute: 120
              hour: 2000
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: consumer
              hide_client_headers: false

      # ── Protected: Executions ─────────────────────────────────────────────────
      - name: executions
        paths:
          - ~^/api/v1/executions
          - ~^/api/executions
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]
          - name: rate-limiting
            config:
              minute: 120
              hour: 3000
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: consumer

      # ── Protected: Execution SSE Stream ──────────────────────────────────────
      - name: execution-stream
        paths:
          - ~^/api/v1/executions/[^/]+/stream
          - ~^/api/executions/[^/]+/stream
        strip_path: false
        methods: [GET]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]
          - name: rate-limiting
            config:
              minute: 30
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: consumer

      # ── Protected: AI ─────────────────────────────────────────────────────────
      - name: ai
        paths:
          - ~^/api/v1/ai
          - ~^/api/ai
        strip_path: false
        methods: [GET, POST, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]
          - name: rate-limiting
            config:
              minute: 60
              hour: 500
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: consumer

      # ── Protected: Billing ────────────────────────────────────────────────────
      - name: billing
        paths:
          - ~^/api/v1/billing
          - ~^/api/billing
          - ~^/api/v1/invoices
          - ~^/api/invoices
          - ~^/api/v1/plans
          - ~^/api/plans
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]
          - name: rate-limiting
            config:
              minute: 60
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: consumer

      # ── Protected: Connectors ─────────────────────────────────────────────────
      - name: connectors
        paths:
          - ~^/api/v1/connectors
          - ~^/api/connectors
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]
          - name: rate-limiting
            config:
              minute: 120
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: consumer

      # ── Protected: Dashboards ─────────────────────────────────────────────────
      - name: dashboards
        paths:
          - ~^/api/v1/dashboards
          - ~^/api/dashboards
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]

      # ── Protected: Templates ──────────────────────────────────────────────────
      - name: templates
        paths:
          - ~^/api/v1/templates
          - ~^/api/templates
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]

      # ── Protected: Search ─────────────────────────────────────────────────────
      - name: search
        paths:
          - ~^/api/v1/search
          - ~^/api/search
        strip_path: false
        methods: [GET, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]
          - name: rate-limiting
            config:
              minute: 200
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: consumer

      # ── Protected: Marketplace ────────────────────────────────────────────────
      - name: marketplace
        paths:
          - ~^/api/v1/marketplace
          - ~^/api/marketplace
        strip_path: false
        methods: [GET, POST, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]

      # ── Protected: Audit ──────────────────────────────────────────────────────
      - name: audit
        paths:
          - ~^/api/v1/audit
          - ~^/api/audit
        strip_path: false
        methods: [GET, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]
          - name: rate-limiting
            config:
              minute: 60
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: consumer

      # ── Protected: Metering ───────────────────────────────────────────────────
      - name: metering
        paths:
          - ~^/api/v1/metering
          - ~^/api/metering
        strip_path: false
        methods: [GET, POST, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]

      # ── Protected: Replication ────────────────────────────────────────────────
      - name: replication
        paths:
          - ~^/api/v1/replication
          - ~^/api/replication
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]

      # ── Protected: GraphQL ────────────────────────────────────────────────────
      - name: graphql
        paths:
          - /api/graphql
        strip_path: false
        methods: [GET, POST, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]
          - name: rate-limiting
            config:
              minute: 300
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: consumer

      # ── Protected: RBAC / Tenants / Users ─────────────────────────────────────
      - name: admin
        paths:
          - ~^/api/v1/tenants
          - ~^/api/tenants
          - ~^/api/v1/users
          - ~^/api/users
          - ~^/api/v1/roles
          - ~^/api/roles
          - ~^/api/v1/environments
          - ~^/api/environments
          - ~^/api/v1/compliance
          - ~^/api/compliance
          - ~^/api/v1/feature-flags
          - ~^/api/feature-flags
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        plugins:
          - name: jwt
            config:
              key_claim_name: sub
              claims_to_verify: [exp]
          - name: rate-limiting
            config:
              minute: 60
              policy: redis
              redis_host: redis
              redis_port: 6379
              limit_by: consumer

# ─── Global Plugins ───────────────────────────────────────────────────────────────
# These plugins apply to every request that passes through Kong.

plugins:
  # Inject x-correlation-id on every request
  - name: correlation-id
    config:
      header_name: x-correlation-id
      generator: uuid#counter
      echo_downstream: true

  # Structured HTTP request logging (stdout → log aggregator)
  - name: http-log
    config:
      http_endpoint: http://localhost:1   # replaced by stdout in DB-less via file-log
      method: POST
      content_type: application/json
      timeout: 1000
      keepalive: 1000
      flush_timeout: 2
      retry_count: 0
      queue:
        max_batch_size: 100
        max_coalescing_delay: 1
        max_entries: 10000

  # File log (stdout) for dev — structured JSON per request
  - name: file-log
    config:
      path: /dev/stdout
      reopen: false

  # Prometheus metrics exposed at :8001/metrics
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

  # Add x-kong-request-id for tracing
  - name: request-id
    config:
      header_name: x-kong-request-id
      echo_downstream: true
      generator: uuid

  # OpenTelemetry tracing — exports traces to OTLP collector
  - name: opentelemetry
    config:
      endpoint: http://otel-collector:4318/v1/traces
      resource_attributes: service.name=longox-kong
      headers:
        x-tenant-id: "$(consumer.custom_id)"
      propagation:
        extract: ["w3c", "baggage"]
        inject: ["w3c", "baggage"]
      queue:
        max_batch_size: 200
        max_coalescing_delay: 1
      sampling_rate: 0.1
