components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT Bearer token obtained from /auth/login or /auth/register"

  parameters:
    TenantHeader:
      name: x-tenant-id
      in: header
      schema:
        type: string
      description: "Tenant context for multi-tenant requests"
    PaginationPage:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PaginationLimit:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    UserSearch:
      name: search
      in: query
      schema:
        type: string
    WorkflowStatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [draft, active, inactive, archived]
    WorkflowSearch:
      name: search
      in: query
      schema:
        type: string
    ExecutionWorkflowFilter:
      name: workflowId
      in: query
      schema:
        type: string
    ExecutionStatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [pending, running, success, failed, cancelled, timed_out]
    ConnectorCategoryFilter:
      name: category
      in: query
      schema:
        type: string
    ConnectorSearch:
      name: search
      in: query
      schema:
        type: string
    MarketplaceCategoryFilter:
      name: category
      in: query
      schema:
        type: string
    MarketplaceTypeFilter:
      name: listingType
      in: query
      schema:
        type: string
    TemplateCategoryFilter:
      name: category
      in: query
      schema:
        type: string
    TemplateSearch:
      name: search
      in: query
      schema:
        type: string
    DashboardSearch:
