openapi: "3.1.0"
info:
  title: "LongoX Platform API"
  version: "1.0.0"
  description: "LongoX API — low-code automation and internal tools platform"
  contact:
    name: "LongoX Support"
    url: "https://longox.io/support"
  license:
    name: "Proprietary"
servers:
  - url: "https://api.longox.io"
    description: "Production"
  - url: "https://staging-api.longox.io"
    description: "Staging"
  - url: "http://localhost:3000"
    description: "Development"

paths:
  # ─── Auth ──────────────────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      operationId: login
      tags: ["Authentication"]
      summary: "Authenticate user with email and password"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: "Login successful"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/register:
    post:
      operationId: register
      tags: ["Authentication"]
      summary: "Register a new user and tenant"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: "Registration successful"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: ["Authentication"]
      summary: "Revoke current session"
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "Logout successful"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/v1/auth/session:
    get:
      operationId: getSession
      tags: ["Authentication"]
      summary: "Get current user session"
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "Current session user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionUser"

  /api/v1/auth/mfa/setup:
    post:
      operationId: setupMfa
      tags: ["Authentication"]
      summary: "Setup MFA TOTP"
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "MFA setup details"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSetupResult"

  /api/v1/auth/mfa/verify:
    post:
      operationId: verifyMfa
      tags: ["Authentication"]
      summary: "Verify MFA code and enable"
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyMfaInput"
      responses:
        "200":
          description: "MFA enabled"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  # ─── Users ──────────────────────────────────────────────────────────────
  /api/v1/users:
    get:
      operationId: listUsers
      tags: ["Users"]
      summary: "List users"
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/UserSearch"
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: "List of users"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer

  /api/v1/users/me:
    get:
      operationId: getCurrentUser
      tags: ["Users"]
      summary: "Get current user profile"
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "Current user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateCurrentUser
      tags: ["Users"]
      summary: "Update current user profile"
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: "Updated user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/v1/users/{id}:
    get:
      operationId: getUser
      tags: ["Users"]
      summary: "Get user by ID"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "User"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateUser
      tags: ["Users"]
      summary: "Update user"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: "Updated user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: ["Users"]
      summary: "Delete user"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "Deleted"

  # ─── Workflows ──────────────────────────────────────────────────────────
  /api/v1/workflows:
    get:
      operationId: listWorkflows
      tags: ["Workflows"]
      summary: "List workflows"
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/WorkflowStatusFilter"
        - $ref: "#/components/parameters/WorkflowSearch"
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: "List of workflows"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Workflow"
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer
    post:
      operationId: createWorkflow
      tags: ["Workflows"]
      summary: "Create a new workflow"
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowInput"
      responses:
        "201":
          description: "Created workflow"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/workflows/{id}:
    get:
      operationId: getWorkflow
      tags: ["Workflows"]
      summary: "Get workflow by ID"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Workflow"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateWorkflow
      tags: ["Workflows"]
      summary: "Update workflow"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkflowInput"
      responses:
        "200":
          description: "Updated workflow"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
    delete:
      operationId: deleteWorkflow
      tags: ["Workflows"]
      summary: "Delete workflow"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workflows/{id}/publish:
    post:
      operationId: publishWorkflow
      tags: ["Workflows"]
      summary: "Publish a workflow version"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Published workflow"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /api/v1/workflows/{id}/run:
    post:
      operationId: runWorkflow
      tags: ["Workflows"]
      summary: "Execute a workflow"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: object
                environment:
                  type: string
      responses:
        "201":
          description: "Execution started"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"

  /api/v1/workflows/{id}/versions:
    get:
      operationId: listWorkflowVersions
      tags: ["Workflows"]
      summary: "List workflow versions"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Workflow versions"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowVersion"
    post:
      operationId: createWorkflowVersion
      tags: ["Workflows"]
      summary: "Create a new workflow version"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionInput"
      responses:
        "201":
          description: "Created version"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowVersion"

  /api/v1/workflows/{id}/versions/{versionId}:
    get:
      operationId: getWorkflowVersion
      tags: ["Workflows"]
      summary: "Get a specific workflow version"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Workflow version"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowVersion"

  /api/v1/workflows/{id}/promotions:
    get:
      operationId: listWorkflowPromotions
      tags: ["Workflows"]
      summary: "List promotions for a workflow"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Promotions"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowPromotion"

  /api/v1/workflows/{id}/diffs:
    get:
      operationId: listWorkflowDiffs
      tags: ["Workflows"]
      summary: "List diffs for a workflow"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Workflow diffs"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowDiff"

  # ─── Executions ─────────────────────────────────────────────────────────
  /api/v1/executions:
    get:
      operationId: listExecutions
      tags: ["Executions"]
      summary: "List executions"
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/ExecutionWorkflowFilter"
        - $ref: "#/components/parameters/ExecutionStatusFilter"
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: "List of executions"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Execution"
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer
    post:
      operationId: createExecution
      tags: ["Executions"]
      summary: "Start a new execution"
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExecutionInput"
      responses:
        "201":
          description: "Execution started"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"

  /api/v1/executions/{id}:
    get:
      operationId: getExecution
      tags: ["Executions"]
      summary: "Get execution details"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Execution details"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/executions/{id}/cancel:
    post:
      operationId: cancelExecution
      tags: ["Executions"]
      summary: "Cancel an execution"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Cancelled execution"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"

  /api/v1/executions/{id}/logs:
    get:
      operationId: getExecutionLogs
      tags: ["Executions"]
      summary: "Get execution logs"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Execution logs"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionLog"

  /api/v1/executions/{id}/checkpoints:
    get:
      operationId: getExecutionCheckpoints
      tags: ["Executions"]
      summary: "Get execution checkpoints"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Execution checkpoints"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionCheckpoint"

  /api/v1/executions/{id}/approve:
    post:
      operationId: approveExecutionTask
      tags: ["Executions"]
      summary: "Approve or reject an approval task"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveTaskInput"
      responses:
        "200":
          description: "Approval processed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalTaskResult"

  # ─── Connectors ─────────────────────────────────────────────────────────
  /api/v1/connectors/marketplace:
    get:
      operationId: listConnectorMarketplace
      tags: ["Connectors"]
      summary: "List available connectors in marketplace"
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/ConnectorCategoryFilter"
        - $ref: "#/components/parameters/ConnectorSearch"
      responses:
        "200":
          description: "Connector marketplace listing"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Connector"
                  total:
                    type: integer

  /api/v1/connectors/{id}:
    get:
      operationId: getConnector
      tags: ["Connectors"]
      summary: "Get connector details"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Connector"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"

  /api/v1/connectors/{id}/actions:
    get:
      operationId: listConnectorActions
      tags: ["Connectors"]
      summary: "List connector actions"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Connector actions"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectorAction"

  /api/v1/connectors/{id}/triggers:
    get:
      operationId: listConnectorTriggers
      tags: ["Connectors"]
      summary: "List connector triggers"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Connector triggers"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectorTrigger"

  /api/v1/connectors/{id}/versions:
    get:
      operationId: listConnectorVersions
      tags: ["Connectors"]
      summary: "List connector versions"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Connector versions"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectorVersion"

  /api/v1/connectors/{id}/install:
    post:
      operationId: installConnector
      tags: ["Connectors"]
      summary: "Install a connector"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Installed connector"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorInstallation"

  /api/v1/connectors/installations:
    get:
      operationId: listInstallations
      tags: ["Connectors"]
      summary: "List tenant connector installations"
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: "Installations"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectorInstallation"

  /api/v1/connectors/installations/{id}:
    delete:
      operationId: uninstallConnector
      tags: ["Connectors"]
      summary: "Uninstall a connector"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "Uninstalled"

  /api/v1/connectors/installations/{id}/configure:
    post:
      operationId: configureConnector
      tags: ["Connectors"]
      summary: "Configure a connector installation"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
      responses:
        "200":
          description: "Configured installation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorInstallation"

  /api/v1/connectors/installations/{id}/execute:
    post:
      operationId: executeConnectorAction
      tags: ["Connectors"]
      summary: "Execute a connector action"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteConnectorInput"
      responses:
        "200":
          description: "Action result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorExecuteResult"

  /api/v1/connectors/installations/{id}/test:
    post:
      operationId: testConnector
      tags: ["Connectors"]
      summary: "Test connector connection"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Test result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorTestResult"

  /api/v1/connectors/installations/{id}/upgrade:
    post:
      operationId: upgradeConnector
      tags: ["Connectors"]
      summary: "Upgrade connector version"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                versionId:
                  type: string
      responses:
        "200":
          description: "Upgraded installation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorInstallation"

  /api/v1/connectors/installations/{id}/rollback:
    post:
      operationId: rollbackConnector
      tags: ["Connectors"]
      summary: "Rollback connector to previous version"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Rollback result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorRollbackResult"

  /api/v1/connectors/installations/{id}/webhooks:
    post:
      operationId: registerConnectorWebhook
      tags: ["Connectors"]
      summary: "Register webhook for connector"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRegistrationInput"
      responses:
        "200":
          description: "Webhook registered"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookRegistration"

  /api/v1/connectors/installations/{id}/poll:
    post:
      operationId: pollConnector
      tags: ["Connectors"]
      summary: "Poll connector for new events"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                triggerId:
                  type: string
