# ─── Query ────────────────────────────────────────────────────────────────

type Query {
  # Auth
  session: User

  # Users
  users(filters: UserFilters): [User!]!
  user(id: ID!): User

  # Workflows
  workflows(filters: WorkflowFilters): WorkflowConnection!
  workflow(id: ID!): Workflow
  workflowVersions(workflowId: ID!): [WorkflowVersion!]!
  workflowVersion(workflowId: ID!, versionId: ID!): WorkflowVersion
  workflowPromotions(workflowId: ID!): [WorkflowPromotion!]!
  workflowDiffs(workflowId: ID!): [WorkflowDiff!]!

  # Executions
  executions(filters: ExecutionFilters): ExecutionConnection!
  execution(id: ID!): Execution
  executionLogs(executionId: ID!): [ExecutionLog!]!
  executionCheckpoints(executionId: ID!): [ExecutionCheckpoint!]!

  # Connectors
  connectors(filters: ConnectorFilters): ConnectorConnection!
  connector(id: ID!): Connector
  connectorActions(connectorId: ID!): [ConnectorAction!]!
  connectorTriggers(connectorId: ID!): [ConnectorTrigger!]!
  connectorVersions(connectorId: ID!): [ConnectorVersion!]!
  installations: [ConnectorInstallation!]!

  # AI
  aiRuns(filters: AiRunFilters): AiRunConnection!
  aiRun(id: ID!): AiRun
  aiModels: [AiModel!]!
  aiGuardrails: [AiGuardrail!]!

  # RAG
  knowledgeBases: [KnowledgeBase!]!
  knowledgeBase(id: ID!): KnowledgeBase

  # Evaluation
  evaluationDatasets: [EvaluationDataset!]!
  evaluationRun(id: ID!): EvaluationRun

  # Marketplace
  marketplaceListings(filters: ListingFilters): [MarketplaceListing!]!
  marketplaceListing(id: ID!): MarketplaceListing
  marketplaceReviews(listingId: ID!): [MarketplaceReview!]!
  pendingMarketplaceListings: [MarketplaceListing!]!
  pendingMarketplaceReviews: [MarketplaceReview!]!

  # Billing
  subscription: Subscription
  plan: BillingPlan
  usage(period: UsagePeriod): UsageSummary
  invoices: [Invoice!]!
  entitlements: Entitlements

  # Environments
  environments: [Environment!]!
  environment(id: ID!): Environment
  promotions: [WorkflowPromotion!]!
  promotion(id: ID!): WorkflowPromotion
  releases(environmentId: ID!): [EnvironmentRelease!]!
  environmentDiff(workflowId: ID!): EnvironmentDiff

  # Templates
  templates(filters: TemplateFilters): [Template!]!
  template(id: ID!): Template

  # Dashboards
  dashboards: [Dashboard!]!
  dashboard(id: ID!): Dashboard

  # Search
  search(query: String!, filters: SearchFilters): SearchResults!

  # Compliance
  gdprExports: [GdprRequest!]!
  auditExports: [AuditExport!]!
  evidence(filters: EvidenceFilters): [ComplianceEvidence!]!
  securityIncidents(filters: IncidentFilters): [SecurityIncident!]!
  residency: DataResidency

  # Tenants
  tiers: [TenantTier!]!
  currentTier: TenantTierAssignment
  currentPlacement: TenantPlacement
  migrations: [TenantMigration!]!

  # DR
  backups(filters: BackupFilters): [BackupRecord!]!
  pools: [RegionalPool!]!
  pool(region: String!): RegionalPool

  # Retention
  retentionPolicy: RetentionPolicy!
  retentionPartitions: [JSON!]!
  archives: [ArchiveExport!]!
}

type EnvironmentDiff {
  from: WorkflowVersion
  to: WorkflowVersion
}

# ─── Mutation ─────────────────────────────────────────────────────────────

type Mutation {
  # Auth
  login(input: LoginInput!): AuthResult!
  register(input: RegisterInput!): AuthResult!
  logout: Boolean!
  setupMfa: MfaSetupResult!
  verifyMfa(input: VerifyMfaInput!): AuthResult!

  # Workflows
  createWorkflow(input: CreateWorkflowInput!): Workflow!
  updateWorkflow(id: ID!, input: UpdateWorkflowInput!): Workflow!
  deleteWorkflow(id: ID!): Boolean!
  publishWorkflow(id: ID!): Workflow!
  runWorkflow(id: ID!): Execution!
  createWorkflowVersion(id: ID!, input: CreateVersionInput!): WorkflowVersion!

  # Executions
  cancelExecution(id: ID!): Execution!
  approveExecutionTask(id: ID!, input: ApproveTaskInput!): Execution!

  # Connectors
  installConnector(id: ID!, input: InstallConnectorInput!): ConnectorInstallation!
  configureConnector(installationId: ID!, input: ConfigureConnectorInput!): ConnectorInstallation!
  executeConnector(installationId: ID!, input: ExecuteConnectorInput!): ConnectorExecuteResult!
  testConnector(installationId: ID!): ConnectorTestResult!
  upgradeConnector(installationId: ID!, versionId: ID!): ConnectorInstallation!
  rollbackConnector(installationId: ID!): ConnectorRollbackResult!
  uninstallConnector(installationId: ID!): Boolean!
  registerWebhook(installationId: ID!, input: WebhookInput!): WebhookRegistration!
  pollConnector(installationId: ID!, input: PollInput!): PollResult!

  # AI
  createAiRun(input: CreateAiRunInput!): AiRun!
  cancelAiRun(id: ID!): Boolean!
  createGuardrail(input: CreateGuardrailInput!): AiGuardrail!
  updateGuardrail(id: ID!, input: UpdateGuardrailInput!): AiGuardrail!
  deleteGuardrail(id: ID!): Boolean!
  scrubPii(input: ScrubPiiInput!): ScrubPiiResult!

  # AI Evaluation
  createEvaluationDataset(input: CreateEvaluationDatasetInput!): EvaluationDataset!
  addEvaluationEntries(datasetId: ID!, entries: [EvaluationEntryInput!]!): EvaluationDataset!
  removeEvaluationEntry(datasetId: ID!, entryId: ID!): Boolean!
  deleteEvaluationDataset(id: ID!): Boolean!
  createEvaluationRun(input: CreateEvaluationRunInput!): EvaluationRun!
  checkRegression(input: RegressionCheckInput!): RegressionResult!

  # RAG
  createKnowledgeBase(input: CreateKbInput!): KnowledgeBase!
  deleteKnowledgeBase(id: ID!): Boolean!
  ingestDocument(kbId: ID!, input: IngestDocumentInput!): KnowledgeDocument!
  deleteDocument(kbId: ID!, docId: ID!): Boolean!
  searchKnowledgeBase(kbId: ID!, input: SearchInput!): RagSearchResult!
  queryKnowledgeBase(kbId: ID!, input: RagQueryInput!): RagQueryResult!
  reindexKnowledgeBase(kbId: ID!): Boolean!

  # Marketplace
  createListing(input: CreateListingInput!): MarketplaceListing!
  updateListing(id: ID!, input: UpdateListingInput!): MarketplaceListing!
  deleteListing(id: ID!): Boolean!
  installListing(id: ID!): Boolean!
  publishListing(id: ID!): MarketplaceListing!
  unpublishListing(id: ID!): MarketplaceListing!
  submitForReview(id: ID!): MarketplaceListing!
  approveListing(id: ID!): MarketplaceListing!
  rejectListing(id: ID!, reason: String!): MarketplaceListing!
  createReview(listingId: ID!, input: CreateReviewInput!): MarketplaceReview!
  updateReview(id: ID!, input: UpdateReviewInput!): MarketplaceReview!
  deleteReview(id: ID!): Boolean!
  moderateReview(id: ID!, action: ReviewAction!, reason: String): MarketplaceReview!

  # Billing
  createCheckoutSession(input: CheckoutInput!): CheckoutSession!
  createPortalSession(returnUrl: String!): PortalSession!
  cancelSubscription: Subscription!
  recordMeteringEvent(input: MeteringEventInput!): Boolean!

  # Environments
  createEnvironment(input: CreateEnvironmentInput!): Environment!
  updateEnvironment(id: ID!, input: UpdateEnvironmentInput!): Environment!
  deleteEnvironment(id: ID!): Boolean!
  promoteEnvironment(input: PromoteInput!): PromotionResult!
  approvePromotion(id: ID!, note: String): WorkflowPromotion!
  rejectPromotion(id: ID!, reason: String!): WorkflowPromotion!
  rollbackPromotion(id: ID!): RollbackResult!

  # Templates
  createTemplate(input: CreateTemplateInput!): Template!
  deleteTemplate(id: ID!): Boolean!
  useTemplate(id: ID!): Boolean!
  forkTemplate(id: ID!): Template!

  # Dashboards
  createDashboard(input: CreateDashboardInput!): Dashboard!
  updateDashboard(id: ID!, input: UpdateDashboardInput!): Dashboard!
  deleteDashboard(id: ID!): Boolean!
  publishDashboard(id: ID!): Dashboard!

  # Compliance
  requestGdprExport: GdprRequest!
  requestGdprDeletion(reason: String!): GdprRequest!
  cancelGdprDeletion(id: ID!): Boolean!
  createAuditExport(input: AuditExportInput!): AuditExport!
  storeEvidence(input: EvidenceInput!): ComplianceEvidence!
  createSecurityIncident(input: CreateIncidentInput!): SecurityIncident!
  updateSecurityIncident(id: ID!, input: UpdateIncidentInput!): SecurityIncident!
  resolveSecurityIncident(id: ID!, resolution: String!): SecurityIncident!
  addIncidentEvidence(incidentId: ID!, input: EvidenceInput!): SecurityIncident!
  setDataResidency(region: String!): DataResidency!

  # Tenants
  createTier(input: CreateTierInput!): TenantTier!
  updateTier(id: ID!, input: UpdateTierInput!): TenantTier!
  changeTier(tierId: ID!): TierChangeResult!
  planMigration(targetTierId: ID!): MigrationPlan!
  executeMigration(planId: ID!): TenantMigration!
  rollbackMigration(migrationId: ID!): TenantMigration!

  # DR
  createBackup(input: CreateBackupInput!): BackupRecord!
  validateBackup(id: ID!): BackupValidation!
  restoreBackup(id: ID!, input: RestoreInput!): RestoreRecord!
  planRollback(service: String!, targetVersion: String!): RollbackPlan!
  executeRollback(service: String!, targetVersion: String!): ReleaseRollback!
  registerPoolHeartbeat(region: String!): RegionalPool!
  triggerFailoverDrill(primaryRegion: String!, drRegion: String!): DrillResult!
  triggerBackupDrill: DrillResult!

  # Retention
  updateRetentionPolicy(input: RetentionPolicyInput!): RetentionPolicy!
  createPartitions: Boolean!
  triggerArchive: ArchiveExport!
  triggerRetentionRun(tenantId: ID!, action: RetentionAction!): Boolean!
}

# ─── Union / Result Types ─────────────────────────────────────────────────

type AuthResult {
  token: String!
  user: SessionUser!
  requiresMfa: Boolean!
}

