kind = "web"
previewPath = "/"
title = "LongoX"
version = "1.0.0"
id = "artifacts/flowcraft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25075

[services.development]
run = "pnpm --filter @longox/flowcraft run dev"

[services.production]
build = [ "pnpm", "--filter", "@longox/flowcraft", "run", "build" ]
publicDir = "artifacts/flowcraft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25075"
BASE_PATH = "/"
