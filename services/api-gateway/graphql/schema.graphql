}

type WidgetSize {
  width: Int!
  height: Int!
}

enum TrustLevel {
  OFFICIAL
  PARTNER
  COMMUNITY
}

type Connector {
  id: ID!
  slug: String!
  name: String!
  trustLevel: TrustLevel!
  versions: [ConnectorVersion!]!
}

type ConnectorVersion {
  id: ID!
  version: String!
