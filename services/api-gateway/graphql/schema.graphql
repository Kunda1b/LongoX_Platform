scalar JSON
scalar Date

type CurrentUser {
  id: ID!
  email: String!
  name: String!
  avatarUrl: String
  tenants: [Membership!]!
}

enum TenantTier {
  SHARED
  DEDICATED_NAMESPACE
  DEDICATED_CLUSTER
}

enum MembershipStatus {
  ACTIVE
  INVITED
  DEACTIVATED
}

type Tenant {
  id: ID!
  name: String!
  tier: TenantTier!
  planId: String!
  region: String!
  memberships: [Membership!]!
}

type Membership {
  userId: ID!
  tenantId: ID!
  role: Role!
  status: MembershipStatus!
}

type Role {
  id: ID!
  name: String!
  permissions: [String!]!
}

enum WorkflowStatus {
  ACTIVE
  INACTIVE
  DRAFT
}

type Workflow {
  id: ID!
  tenantId: ID!
  name: String!
  status: WorkflowStatus!
  currentVersionId: ID
  tags: [String!]!
  currentVersion: WorkflowVersion
  versions(first: Int, after: String): WorkflowVersionConnection!
}

type WorkflowVersion {
  id: ID!
  versionNumber: Int!
  graph: GraphSnapshot!
  checksum: String!
  createdBy: ID!
  publishedAt: String!
}

type WorkflowVersionConnection {
  edges: [WorkflowVersionEdge!]!
  pageInfo: PageInfo!
}

type WorkflowVersionEdge {
  node: WorkflowVersion!
  cursor: String!
}

type GraphSnapshot {
  nodes: [Node!]!
  edges: [Edge!]!
  variables: [Variable!]!
  policies: [Policy!]!
}

type Node {
  id: ID!
  name: String!
  type: String!
  position: Position
  config: JSON
}

type Position {
  x: Float!
  y: Float!
}

type Edge {
  id: ID!
  source: ID!
  target: ID!
  label: String
  condition: JSON
}

type Variable {
  key: String!
  value: JSON!
}

type Policy {
  type: String!
  config: JSON!
}

enum ExecutionStatus {
  RUNNING
  SUCCESS
  FAILED
  CANCELLED
  PENDING
}

type Execution {
  id: ID!
  workflowVersionId: ID!
  status: ExecutionStatus!
  startedAt: String!
  finishedAt: String
