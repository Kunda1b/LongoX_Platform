  installCount: Int!
}

type TemplateVersion {
  id: ID!
  versionNumber: Int!
  templateId: ID!
  createdAt: String!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

input WorkflowFilter {
  status: WorkflowStatus
  search: String
  tags: [String!]
}

input ExecutionFilter {
  workflowId: ID
  status: ExecutionStatus
}

type WorkflowConnection {
  edges: [WorkflowEdgeNode!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type WorkflowEdgeNode {
