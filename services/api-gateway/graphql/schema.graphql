}

type Promotion {
  id: ID!
  workflowId: ID!
  sourceEnvironment: String!
  targetEnvironment: String!
  versionId: ID!
  promotedBy: ID!
  promotedAt: String!
  status: String!
}

type Query {
  me: CurrentUser!
  tenants: [Tenant!]!
  tenant(id: ID!): Tenant
  workflows(
    filter: WorkflowFilter
    first: Int
    after: String
  ): WorkflowConnection!
  workflow(id: ID!): Workflow
  workflowVersion(id: ID!): WorkflowVersion
  executions(
    filter: ExecutionFilter
    first: Int
    after: String
  ): ExecutionConnection!
  execution(id: ID!): Execution
  dashboards: [Dashboard!]!
  dashboard(id: ID!): Dashboard
  connector(id: ID!): Connector
  connectors(
    first: Int
    after: String
    filter: ConnectorFilter
  ): ConnectorConnection!
  templates(category: String, first: Int, after: String): TemplateConnection!
  template(id: ID!): Template
  marketplaceListings(
    first: Int
    after: String
    category: String
  ): MarketplaceListingConnection!
  marketplaceListing(id: ID!): MarketplaceListing
  aiRuns(first: Int, after: String): AiRunConnection!
  aiRun(id: ID!): AiRun
  aiModels: [AiModel!]!
  aiPrompts(first: Int, after: String): AiPromptConnection!
  aiPrompt(id: ID!): AiPrompt
  billingAccount: BillingAccount!
  invoices(first: Int, after: String): InvoiceConnection!
  invoice(id: ID!): Invoice
  subscription(id: ID!): Subscription
  usageMetrics(scope: String!, range: String!): UsageMetrics!
  auditLog(filter: AuditFilter, first: Int, after: String): AuditLogConnection!
  search(query: String!, types: [String!], first: Int): SearchResultConnection!
  environments(workflowId: ID!): [Environment!]!
  environment(id: ID!): Environment
  credential(id: ID!): Credential
  credentials: [Credential!]!
  webhookEndpoint(id: ID!): WebhookEndpoint
  webhookEndpoints: [WebhookEndpoint!]!
  apps: [App!]!
  app(id: ID!): App
  featureFlags: [FeatureFlag!]!
  featureFlag(key: String!): FeatureFlag
  roles: [Role!]!
  role(id: ID!): Role
  members(tenantId: ID!): [Membership!]!
}

type Mutation {
  # Workflow mutations
  createWorkflow(input: CreateWorkflowInput!): Workflow!
  updateWorkflow(input: UpdateWorkflowInput!): Workflow!
  deleteWorkflow(id: ID!): Boolean!
  publishWorkflow(input: PublishWorkflowInput!): PublishWorkflowPayload!
  unpublishWorkflow(id: ID!): Workflow!
  duplicateWorkflow(id: ID!): Workflow!

  # Execution mutations
  runWorkflow(input: RunWorkflowInput!): Execution!
  retryExecution(id: ID!): Execution!
  cancelExecution(id: ID!): Execution!
  pauseExecution(id: ID!): Execution!
  resumeExecution(id: ID!): Execution!

  # Dashboard mutations
  createDashboard(input: CreateDashboardInput!): CreateDashboardPayload!
  updateDashboard(input: UpdateDashboardInput!): Dashboard!
  deleteDashboard(id: ID!): Boolean!
  publishDashboard(id: ID!): Dashboard!

  # Connector mutations
  installConnector(input: InstallConnectorInput!): InstallConnectorPayload!
  uninstallConnector(id: ID!): Boolean!
  configureConnector(input: ConfigureConnectorInput!): Connector!
  upgradeConnector(input: UpgradeConnectorInput!): Connector!
  rollbackConnector(input: RollbackConnectorInput!): Connector!

  # Environment mutations
  promoteEnvironment(
    input: PromoteEnvironmentInput!
  ): PromoteEnvironmentPayload!
  requestPromotion(input: RequestPromotionInput!): Promotion!
  approvePromotion(input: ApprovePromotionInput!): Promotion!
  rejectPromotion(input: RejectPromotionInput!): Promotion!
  rollbackEnvironment(input: RollbackEnvironmentInput!): Environment!

  # AI mutations
  runAiPrompt(input: RunAiPromptInput!): AiRun!
  cancelAiRun(id: ID!): AiRun!
  createAiPrompt(input: CreateAiPromptInput!): AiPrompt!
  updateAiPrompt(input: UpdateAiPromptInput!): AiPrompt!
  publishAiPrompt(id: ID!): AiPrompt!
  deleteAiPrompt(id: ID!): Boolean!
  uploadKnowledgeBase(input: UploadKnowledgeBaseInput!): KnowledgeBase!

  # Billing mutations
  createCheckoutSession(input: CreateCheckoutSessionInput!): CheckoutSession!
  cancelSubscription(id: ID!): Subscription!
  updateSubscription(input: UpdateSubscriptionInput!): Subscription!
  applyCoupon(input: ApplyCouponInput!): BillingAccount!

  # Marketplace mutations
  publishMarketplaceListing(
    input: PublishMarketplaceListingInput!
  ): MarketplaceListing!
  installMarketplaceListing(id: ID!): Boolean!

  # Credential mutations
  createCredential(input: CreateCredentialInput!): Credential!
  updateCredential(input: UpdateCredentialInput!): Credential!
  deleteCredential(id: ID!): Boolean!

  # Webhook mutations
  createWebhookEndpoint(input: CreateWebhookEndpointInput!): WebhookEndpoint!
  updateWebhookEndpoint(input: UpdateWebhookEndpointInput!): WebhookEndpoint!
  deleteWebhookEndpoint(id: ID!): Boolean!

  # App mutations
  createApp(input: CreateAppInput!): App!
  updateApp(input: UpdateAppInput!): App!
  deleteApp(id: ID!): Boolean!

  # Member/invitation mutations
  inviteMember(input: InviteMemberInput!): Membership!
  removeMember(input: RemoveMemberInput!): Boolean!
  updateMemberRole(input: UpdateMemberRoleInput!): Membership!

  # Feature flag mutations
  setFeatureFlag(input: SetFeatureFlagInput!): FeatureFlag!

  # Audit export
  requestAuditExport(input: RequestAuditExportInput!): AuditExportJob!

  # GDPR
  requestGdprExport(input: RequestGdprExportInput!): GdprExportJob!
  requestGdprDeletion(input: RequestGdprDeletionInput!): GdprDeletionJob!
}

