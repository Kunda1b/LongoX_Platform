  checkpoints: [Checkpoint!]!
}

type StepResult {
  nodeId: ID!
  status: String!
  output: JSON
  error: String
  durationMs: Int!
  attemptNumber: Int!
}

type Checkpoint {
  id: ID!
  nodeId: ID!
  state: JSON!
  createdAt: String!
}

enum DashboardStatus {
  DRAFT
  PUBLISHED
}

type Dashboard {
  id: ID!
  tenantId: ID!
  title: String!
  status: DashboardStatus!
  currentVersionId: ID
