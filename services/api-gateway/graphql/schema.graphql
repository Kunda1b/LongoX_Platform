type ValidationError {
  field: String!
  message: String!
}

type ValidationWarning {
  field: String!
  message: String!
}

input PublishWorkflowInput {
  workflowId: ID!
  expectedDraftVersion: Int!
  releaseNotes: String
}

type PublishWorkflowPayload {
  workflowVersion: WorkflowVersion!
