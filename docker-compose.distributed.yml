version: "3.8"

services:
  # ─── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: longox
      POSTGRES_USER: longox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-longox_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U longox"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm="]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Observability ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infrastructure/otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3010:3000"

  jaeger:
    image: jaegertracing/all-in-one:1.61.0
    ports:
      - "16686:16686"

  # ─── API Gateway ─────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://longox:${POSTGRES_PASSWORD:-longox_dev}@postgres:5432/longox
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      EXECUTION_SERVICE_URL: http://execution-service:3002
      AI_SERVICE_URL: http://ai-service:3003
      BILLING_SERVICE_URL: http://billing-service:3004
      SEARCH_SERVICE_URL: http://search-service:3005
      EVENT_BUS_TYPE: nats
      EVENT_BUS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ─── Extracted Services ──────────────────────────────────────────
  execution-service:
    build:
      context: .
      dockerfile: services/execution-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgres://longox:${POSTGRES_PASSWORD:-longox_dev}@postgres:5432/longox
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      EVENT_BUS_TYPE: nats
      EVENT_BUS_URL: nats://nats:4222
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgres://longox:${POSTGRES_PASSWORD:-longox_dev}@postgres:5432/longox
      NATS_URL: nats://nats:4222
      EVENT_BUS_TYPE: nats
      EVENT_BUS_URL: nats://nats:4222
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgres://longox:${POSTGRES_PASSWORD:-longox_dev}@postgres:5432/longox
      NATS_URL: nats://nats:4222
      EVENT_BUS_TYPE: nats
      EVENT_BUS_URL: nats://nats:4222
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgres://longox:${POSTGRES_PASSWORD:-longox_dev}@postgres:5432/longox
      NATS_URL: nats://nats:4222
      EVENT_BUS_TYPE: nats
      EVENT_BUS_URL: nats://nats:4222
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-}
      TYPESENSE_HOST: ${TYPESENSE_HOST:-localhost}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ─── Web App ─────────────────────────────────────────────────────
  web-app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:3000
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  nats_data:
