openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: LongoX API — low-code automation and internal tools platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: workflows
    description: Automation workflow management
  - name: connectors
    description: Integration connectors and marketplace
  - name: executions
    description: Workflow execution history
  - name: apps
    description: Low-code internal apps and dashboards
  - name: dashboards
    description: Dashboard builder and management
  - name: dashboard
    description: Platform overview and summaries
  - name: templates
    description: Workflow template library
  - name: credentials
    description: Connector credential management
  - name: node-types
    description: Available workflow node types
  - name: analytics
    description: Execution analytics and process insights
  - name: audit
    description: Audit log
  - name: schedules
    description: Workflow schedule management
  - name: datasources
    description: Data source connections for dashboards

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Dashboard / Summary ────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Platform-wide summary stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent execution activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ─── Analytics (UiPath-inspired) ─────────────────────────────────────
  /analytics/executions:
    get:
      operationId: getExecutionAnalytics
      tags: [analytics]
      summary: Daily execution stats over a time window
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 14
      responses:
        "200":
          description: Daily stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyExecutionStat"

  /analytics/workflows:
    get:
      operationId: getWorkflowAnalytics
      tags: [analytics]
      summary: Per-workflow execution stats
      responses:
        "200":
          description: Workflow stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowStat"

  # ─── Node Types (n8n-inspired) ────────────────────────────────────────
  /node-types:
    get:
      operationId: listNodeTypes
      tags: [node-types]
      summary: List all available workflow node types
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Node type list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NodeType"

  # ─── Templates (Zapier/n8n-inspired) ─────────────────────────────────
  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List workflow templates
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a custom template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateCreate"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a template by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a custom template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /templates/{id}/versions:
    get:
      operationId: listTemplateVersions
      tags: [templates]
      summary: List version snapshots for a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateVersion"

  /templates/{id}/fork:
    post:
      operationId: forkTemplate
      tags: [templates]
      summary: Fork a template into a new editable copy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Forked template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Not found

  /templates/{id}/use:
    post:
      operationId: useTemplate
      tags: [templates]
      summary: Clone a template into a new workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Cloned workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  # ─── Credentials (n8n-inspired) ────────────────────────────────────────
  /credentials:
    get:
      operationId: listCredentials
      tags: [credentials]
      summary: List saved credentials
      responses:
        "200":
          description: Credential list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credential"
    post:
      operationId: createCredential
      tags: [credentials]
      summary: Save a new credential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialInput"
      responses:
        "201":
          description: Created credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"

  /credentials/{id}:
    delete:
      operationId: deleteCredential
      tags: [credentials]
      summary: Delete a credential
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Workflows ──────────────────────────────────────────────────────
  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      summary: List all workflows
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, draft]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Workflow list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workflow"
    post:
      operationId: createWorkflow
      tags: [workflows]
      summary: Create a new workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /workflows/{id}:
    get:
      operationId: getWorkflow
      tags: [workflows]
      summary: Get a workflow by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
        "404":
          description: Not found
    patch:
      operationId: updateWorkflow
      tags: [workflows]
      summary: Update a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
    delete:
      operationId: deleteWorkflow
      tags: [workflows]
      summary: Delete a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workflows/{id}/toggle:
    post:
      operationId: toggleWorkflow
      tags: [workflows]
      summary: Activate or deactivate a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /workflows/{id}/run:
    post:
      operationId: runWorkflow
      tags: [workflows]
      summary: Manually trigger a workflow run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"

  /workflows/{id}/duplicate:
    post:
      operationId: duplicateWorkflow
      tags: [workflows]
      summary: Duplicate a workflow (Make/n8n-style clone)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Duplicated workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /workflows/{id}/versions:
    get:
      operationId: listWorkflowVersions
      tags: [workflows]
      summary: List saved DAG version snapshots for a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowVersion"

  /workflows/{id}/publish:
    post:
      operationId: publishWorkflow
      tags: [workflows]
      summary: Publish an immutable workflow version and activate it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Published version record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowVersion"
        "404":
          description: Not found

  # ─── Dashboards (Builder) ─────────────────────────────────────────────
  /dashboards:
    get:
      operationId: listDashboards
      tags: [dashboards]
      summary: List all dashboards
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published]
      responses:
        "200":
          description: Dashboard list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dashboard"
    post:
      operationId: createDashboard
      tags: [dashboards]
      summary: Create a new dashboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardInput"
      responses:
        "201":
          description: Created dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  /dashboards/stats:
    get:
      operationId: getDashboardBuilderStats
      tags: [dashboards]
      summary: Dashboard usage stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboards/{id}:
    get:
      operationId: getDashboard
      tags: [dashboards]
      summary: Get dashboard by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        "404":
          description: Not found
    patch:
      operationId: updateDashboard
      tags: [dashboards]
      summary: Update a dashboard (layout, name, widgets)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardUpdate"
      responses:
        "200":
          description: Updated dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
    delete:
      operationId: deleteDashboard
      tags: [dashboards]
      summary: Delete a dashboard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboards/{id}/publish:
    post:
      operationId: publishDashboard
      tags: [dashboards]
      summary: Publish a dashboard (make it live)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        "404":
          description: Not found

  # ─── Billing & Usage ────────────────────────────────────────────────
  /usage:
    get:
      operationId: getUsageSummary
      tags: [billing]
      summary: Get usage summary for the current period
      responses:
        "200":
          description: Usage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageSummary"

  /usage/events:
    get:
      operationId: listUsageEvents
      tags: [billing]
      summary: List usage events
      parameters:
        - name: workflowId
          in: query
          schema:
            type: integer
        - name: eventType
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Usage event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsageEvent"

  /billing/current:
    get:
      operationId: getCurrentBillingPeriod
      tags: [billing]
      summary: Get current billing period details
      responses:
        "200":
          description: Current billing period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPeriod"

  /billing/invoices:
    get:
      operationId: listBillingInvoices
      tags: [billing]
      summary: List past billing invoices
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingInvoice"

  # ─── Environments ────────────────────────────────────────────────────
  /environments:
    get:
      operationId: listEnvironments
      tags: [environments]
      summary: List deployment environments
      responses:
        "200":
          description: Environment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Environment"
    post:
      operationId: createEnvironment
      tags: [environments]
      summary: Create a new environment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnvironmentInput"
      responses:
        "201":
          description: Created environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"

  /environments/{id}:
    get:
      operationId: getEnvironment
      tags: [environments]
      summary: Get environment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "404":
          description: Not found
    patch:
      operationId: updateEnvironment
      tags: [environments]
      summary: Update an environment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnvironmentInput"
      responses:
        "200":
          description: Updated environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "404":
          description: Not found
    delete:
      operationId: deleteEnvironment
      tags: [environments]
      summary: Delete an environment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Workflow Promotions ──────────────────────────────────────────────
  /workflows/{id}/promotions:
    get:
      operationId: listWorkflowPromotions
      tags: [workflows]
      summary: List environment promotions for a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Promotion history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowPromotion"
    post:
      operationId: promoteWorkflow
      tags: [workflows]
      summary: Promote a workflow to an environment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Promotion record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowPromotion"
        "404":
          description: Not found

  # ─── Webhook Triggers ────────────────────────────────────────────────
  /webhooks/{workflowId}:
    post:
      operationId: triggerWebhook
      tags: [executions]
      summary: Trigger a workflow via inbound webhook
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Execution queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"

  # ─── Dead-Letter Queue ───────────────────────────────────────────────
  /dlq:
    get:
      operationId: listDlqEntries
      tags: [executions]
      summary: List dead-letter queue entries (failed jobs awaiting retry/dismiss)
      parameters:
        - name: resolved
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: DLQ entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DlqEntry"

  /dlq/{id}/retry:
    post:
      operationId: retryDlqEntry
      tags: [executions]
      summary: Re-queue a DLQ entry (re-runs the full workflow)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Re-queued execution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"

  /dlq/{id}/dismiss:
    post:
      operationId: dismissDlqEntry
      tags: [executions]
      summary: Dismiss (mark resolved) a DLQ entry without retrying
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DlqEntry"

  # ─── Audit Log ───────────────────────────────────────────────────────
  /audit-log:
    get:
      operationId: listAuditLog
      tags: [audit]
      summary: List audit log entries
      parameters:
        - name: resourceType
          in: query
          schema:
            type: string
        - name: resourceId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"

  # ─── Executions ──────────────────────────────────────────────────────
  /executions:
    get:
      operationId: listExecutions
      tags: [executions]
      summary: List executions across all workflows
      parameters:
        - name: workflowId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [running, success, failed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Execution list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Execution"

  /executions/{id}:
    get:
      operationId: getExecution
      tags: [executions]
      summary: Get execution detail with step logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Execution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionDetail"

  /executions/{id}/retry:
    post:
      operationId: retryExecution
      tags: [executions]
      summary: Retry a failed execution (Zapier/Make-style)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: New execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"

  # ─── Connectors ──────────────────────────────────────────────────────
  /connectors:
    get:
      operationId: listConnectors
      tags: [connectors]
      summary: List available connectors/integrations
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: installed
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Connector list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Connector"

  /connectors/{id}:
    get:
      operationId: getConnector
      tags: [connectors]
      summary: Get connector detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"

  /connectors/{id}/install:
    post:
      operationId: installConnector
      tags: [connectors]
      summary: Install a connector from the marketplace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Installed connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"

  /connectors/categories:
    get:
      operationId: listConnectorCategories
      tags: [connectors]
      summary: List all connector categories with counts
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectorCategory"

  # ─── Apps (Internal Tools Builder) ──────────────────────────────────
  /apps:
    get:
      operationId: listApps
      tags: [apps]
