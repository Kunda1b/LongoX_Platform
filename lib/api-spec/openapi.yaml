          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataSourceInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSource"
    delete:
      operationId: deleteDataSource
      tags: [datasources]
      summary: Delete a data source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /datasources/{id}/test:
    post:
      operationId: testDataSourceConnection
      tags: [datasources]
      summary: Test a data source connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string

  /datasources/{id}/query:
    post:
      operationId: executeDataSourceQuery
      tags: [datasources]
      summary: Execute a query against a data source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
      responses:
        "200":
          description: Query result
          content:
            application/json:
              schema:
                type: object
                properties:
                  columns:
                    type: array
                    items:
                      type: string
                  rows:
                    type: array
                    items:
                      type: object
                  rowCount:
                    type: integer
                  executionTimeMs:
                    type: integer

  /datasources/{id}/tables:
    get:
      operationId: listDataSourceTables
      tags: [datasources]
      summary: List tables in a data source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Table list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

