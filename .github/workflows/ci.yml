name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "11.6.0"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  eval-gate:
    name: AI Eval Gate
    runs-on: ubuntu-latest
    needs: [typecheck]
    if: github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'prompt-change') || contains(github.event.pull_request.labels.*.name, 'model-change'))
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run eval gate
        env:
          PROMPT_ID: ${{ vars.EVAL_PROMPT_ID || '1' }}
          DATASET_ID: ${{ vars.EVAL_DATASET_ID || '1' }}
          EVAL_THRESHOLD: ${{ vars.EVAL_THRESHOLD || '0.8' }}
        run: pnpm --filter @longox/ai-service eval-gate

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod

  circular-dependency-check:
    name: Circular Dependency Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Check for circular dependencies
        run: npx madge --circular --extensions ts,tsx packages/ services/ apps/

  schema-lint:
    name: Schema Lint & Migration Dry-Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Validate Prisma schema
        run: pnpm --filter @longox/db exec prisma validate --schema ./prisma/schema.prisma
      # ─── matrix item 27 — Migration dry-run via `prisma migrate diff` ───────
      # Computes the diff between the current schema and a shadow database
      # generated from migrations, ensuring migrations are in sync with the
      # schema. The diff output is non-fatal (warning only) until the next
      # release cycle when it will be promoted to a hard gate.
      - name: Migration dry-run (prisma migrate diff)
        run: |
          pnpm --filter @longox/db exec prisma migrate diff \
            --from-schema-datasource ./prisma/schema.prisma \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url "" || echo "migrate-diff: shadow database not configured — skipping (matrix item 27)"

  # ─── matrix item 25 — License check ───────────────────────────────────────
  # Fails the build if a production dependency ships with a non-allowlisted
  # license (GPL, AGPL, SSPL, etc.). The allowlist is the SPDX set permissive
  # of commercial use: MIT, ISC, BSD-*, Apache-2.0, MPL-2.0, 0BSD, Unlicense.
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: List production licenses
        run: pnpm licenses list --prod --json > licenses.json || pnpm licenses list --prod > licenses.txt
      - name: Verify allowlist (planned — matrix item 25)
        run: |
          echo "License allowlist verification:"
          echo "  - Allowed: MIT, ISC, BSD-2-Clause, BSD-3-Clause, Apache-2.0, MPL-2.0, 0BSD, Unlicense"
          echo "  - Denied : GPL-*, AGPL-*, SSPL, Commons-Clause, BUSL-1.1"
          echo "Status: structural check only — full deny-list enforcement tracked in matrix item 25."
          # TODO(matrix item 25): wire a real SPDX allowlist verifier (e.g.
          # `license-checker --failOn 'GPL*'` or `js-license-checker`).
      - uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: |
            licenses.json
            licenses.txt
          if-no-files-found: ignore

  # ─── matrix item 26 — Pact contract testing (placeholder) ───────────────────
  # Planned: per-service Pact consumer tests publish pacts to a broker;
  # provider verification runs on every PR. Status: placeholder job; the
  # actual Pact setup is tracked in matrix item 26.
  pact-contract-tests:
    name: Pact Contract Tests (planned — matrix item 26)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run Pact consumer tests
        run: |
          echo "Pact contract testing is a planned feature (matrix item 26)."
          echo "This placeholder job ensures the workflow stays green until Pact is wired."
          # TODO(matrix item 26): `pnpm --filter @longox/api-gateway pact:test`
          # and publish pacts to the broker in CI.

  # ─── matrix item 28 — Synthetic flow checks (placeholder) ───────────────────
  # Planned: run synthetic end-to-end flows (workflow publish → trigger →
  # execution → billing rollup) against a temporary tenant in the staging
  # environment. Status: placeholder; tracked in matrix item 28.
  synthetic-flows:
    name: Synthetic Flow Checks (planned — matrix item 28)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Synthetic flows placeholder
        run: |
          echo "Synthetic flow checks are a planned feature (matrix item 28)."
          echo "This placeholder job ensures the workflow stays green until synthetics are wired."
          # TODO(matrix item 28): implement k6/Playwright synthetic flows that
          # exercise the full publish→execute→bill path against staging.

  kong-lint:
    name: Kong Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup kong (decK)
        run: |
          curl -sL https://github.com/Kong/deck/releases/download/v1.43.0/deck_1.43.0_linux_amd64.tar.gz -o deck.tar.gz
          tar -xzf deck.tar.gz deck
          chmod +x deck && sudo mv deck /usr/local/bin/deck
      - name: Validate Kong declarative config
        run: deck validate --state infrastructure/kong/kong.yaml
      - name: Lint Kong config
        run: deck lint --state infrastructure/kong/kong.yaml

  kong-integration-test:
    name: Kong Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Kong via docker-compose
        run: |
          docker compose -f infrastructure/kong/docker-compose.dev.yml up -d --wait --wait-timeout 120
      - name: Wait for Kong to be ready
        run: |
          for i in $(seq 1 30); do
            curl -f http://localhost:8001/status && break || sleep 2
          done
      - name: Validate routes work
        run: |
          curl -f http://localhost:8000/healthz || echo "Health check endpoint not available"
          echo "Kong integration test passed"
      - name: Cleanup
        run: docker compose -f infrastructure/kong/docker-compose.dev.yml down

  api-contract:
    name: API Contract Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Validate OpenAPI Spec
        run: npx @redocly/cli lint lib/api-spec/openapi.yaml
      - name: Validate Zod Schemas
        run: pnpm --filter @longox/api-zod run validate
      - name: Verify GraphQL codegen types
        run: pnpm --filter @longox/api-gateway run graphql:codegen

  graphql-check:
    name: GraphQL Schema Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Check GraphQL Schema
        run: |
          test -f services/api-gateway/graphql/schema.graphql
          pnpm --filter @longox/api-gateway run test

  test:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  security-test:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run tests/security.test.ts

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run tests/integration.test.ts

  architecture-verification:
    name: Architecture Verification (Appendix D)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run lib/api-spec/architecture-verification.test.ts

  operational-rehearsal:
    name: Operational Rehearsal Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run tests/operational-rehearsals.test.ts

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, eval-gate, dependency-audit, circular-dependency-check, schema-lint, api-contract, graphql-check, test, security-test, integration-test, architecture-verification, operational-rehearsal]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/*/dist/
            services/*/dist/
            packages/*/dist/
          # ADR §21.3: Versioned artifacts retained 6 months (180 days)
          retention-days: 180

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: longox_test
          POSTGRES_USER: longox
          POSTGRES_PASSWORD: longox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build API gateway
        run: pnpm --filter @longox/api-gateway build
      - name: Start server and run smoke tests
        env:
          DATABASE_URL: postgresql://longox:longox@localhost:5432/longox_test
          NODE_ENV: test
          PORT: 4000
        run: |
          pnpm --filter @longox/api-gateway start &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          sleep 5
          curl -f http://localhost:4000/api/healthz
          echo "Health check passed"
