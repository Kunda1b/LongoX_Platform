name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAMESPACE: longox
  DOCKER_USERNAME: ${{ github.actor }}

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - workflow-service
          - execution-service
          - scheduler-service
          - connector-service
          - template-service
          - marketplace-service
          - dashboard-service
          - datasource-service
          - ai-service
          - billing-service
          - metering-service
          - notification-service
          - audit-service
          - search-service
          - platform-service
    steps:
      - uses: actions/checkout@v4
      - name: Set Docker tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging-canary:
    name: Deploy Canary to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
      - name: Deploy canary (10% traffic)
        run: |
          for svc in api-gateway execution-service workflow-service; do
            ns="platform-control"
            case "$svc" in
              execution-service) ns="platform-execution" ;;
            esac
            # Create canary deployment with version label
            kubectl set image "deployment/$svc-canary" "$svc=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/$svc:${{ github.sha }}" -n "$ns" 2>/dev/null || \
            kubectl create deployment "$svc-canary" --image="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/$svc:${{ github.sha }}" --replicas=1 -n "$ns"
            # Label for canary routing
            kubectl label deployment "$svc-canary" "app.kubernetes.io/canary=true" --overwrite -n "$ns"
          done
          echo "Canary deployments created. Monitoring for 5 minutes..."
          sleep 300
      - name: Canary smoke test
        run: |
          # Check canary pods are healthy
          for svc in api-gateway execution-service workflow-service; do
            ns="platform-control"
            case "$svc" in
              execution-service) ns="platform-execution" ;;
            esac
            kubectl rollout status "deployment/$svc-canary" -n "$ns" --timeout=3m
          done
          echo "Canary health checks passed"

  deploy-staging:
    name: Promote to Staging
    runs-on: ubuntu-latest
    needs: [deploy-staging-canary]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
      - name: Promote to full staging
        run: |
          for svc in api-gateway auth-service workflow-service execution-service scheduler-service connector-service template-service marketplace-service dashboard-service datasource-service ai-service billing-service metering-service notification-service audit-service search-service platform-service; do
            ns="platform-control"
            case "$svc" in
              execution-service|scheduler-service|ai-service) ns="platform-execution" ;;
              audit-service|metering-service|notification-service|search-service) ns="platform-observability" ;;
            esac
            kubectl set image "deployment/$svc" "$svc=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/$svc:${{ github.sha }}" -n "$ns"
          done
          kubectl rollout status deployment/api-gateway -n platform-control --timeout=5m
          # Clean up canary after successful promotion
          for svc in api-gateway execution-service workflow-service; do
            ns="platform-control"
            case "$svc" in
              execution-service) ns="platform-execution" ;;
            esac
            kubectl delete deployment "$svc-canary" -n "$ns" 2>/dev/null || true
          done
          echo "Full staging deployment complete"

  deploy-production-canary:
    name: Deploy Canary to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
      - name: Deploy canary (5% traffic)
        run: |
          echo "Deploying canary version ${{ github.ref_name }} to production..."
          for svc in api-gateway execution-service workflow-service; do
            ns="platform-control"
            case "$svc" in
              execution-service) ns="platform-execution" ;;
            esac
            kubectl set image "deployment/$svc-canary" "$svc=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/$svc:${{ github.ref_name }}" -n "$ns" 2>/dev/null || \
            kubectl create deployment "$svc-canary" --image="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/$svc:${{ github.ref_name }}" --replicas=1 -n "$ns"
            kubectl label deployment "$svc-canary" "app.kubernetes.io/canary=true" --overwrite -n "$ns"
          done
      - name: Monitor canary (10 minute observation window)
        run: |
          echo "Observing canary for 10 minutes..."
          for i in $(seq 1 10); do
            sleep 60
            for svc in api-gateway execution-service workflow-service; do
              ns="platform-control"
              case "$svc" in
                execution-service) ns="platform-execution" ;;
              esac
              READY=$(kubectl get deployment "$svc-canary" -n "$ns" -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
              echo "[minute $i] $svc canary ready replicas: $READY"
              if [ "$READY" -lt 1 ]; then
                echo "Canary $svc not healthy at minute $i"
              fi
            done
          done
          echo "Observation window complete"
      - name: Canary health verification
        run: |
          for svc in api-gateway execution-service workflow-service; do
            ns="platform-control"
            case "$svc" in
              execution-service) ns="platform-execution" ;;
            esac
            kubectl rollout status "deployment/$svc-canary" -n "$ns" --timeout=5m || {
              echo "Canary $svc failed health check. Rolling back..."
              kubectl delete deployment "$svc-canary" -n "$ns" 2>/dev/null || true
              exit 1
            }
          done
          echo "All canaries healthy. Ready for full rollout."

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-production-canary]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
      - name: Deploy
        run: |
          for svc in api-gateway auth-service workflow-service execution-service scheduler-service connector-service template-service marketplace-service dashboard-service datasource-service ai-service billing-service metering-service notification-service audit-service search-service platform-service; do
            ns="platform-control"
            case "$svc" in
              execution-service|scheduler-service|ai-service) ns="platform-execution" ;;
              audit-service|metering-service|notification-service|search-service) ns="platform-observability" ;;
            esac
            kubectl set image "deployment/$svc" "$svc=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/$svc:${{ github.ref_name }}" -n "$ns"
          done
          kubectl rollout status deployment/api-gateway -n platform-control --timeout=5m
          # Clean up canary deployments
          for svc in api-gateway execution-service workflow-service; do
            ns="platform-control"
            case "$svc" in
              execution-service) ns="platform-execution" ;;
            esac
            kubectl delete deployment "$svc-canary" -n "$ns" 2>/dev/null || true
          done

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure() && startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
      - name: Rollback to previous version
        run: |
          echo "Production deployment failed. Rolling back..."
          for svc in api-gateway auth-service workflow-service execution-service scheduler-service connector-service template-service marketplace-service dashboard-service datasource-service ai-service billing-service metering-service notification-service audit-service search-service platform-service; do
            ns="platform-control"
            case "$svc" in
              execution-service|scheduler-service|ai-service) ns="platform-execution" ;;
              audit-service|metering-service|notification-service|search-service) ns="platform-observability" ;;
            esac
            kubectl rollout undo "deployment/$svc" -n "$ns" || true
          done
          # Clean up canaries
          for svc in api-gateway execution-service workflow-service; do
            ns="platform-control"
            case "$svc" in
              execution-service) ns="platform-execution" ;;
            esac
            kubectl delete deployment "$svc-canary" -n "$ns" 2>/dev/null || true
          done
          echo "Rollback complete"
