name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_USERNAME: ${{ github.actor }}

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - execution-service
          - auth-service
          - workflow-service
    steps:
      - uses: actions/checkout@v4
      - name: Set Docker tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/autoflow/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKER_REGISTRY }}/autoflow/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
      - name: Deploy
        run: |
          kubectl set image deployment/api-gateway -n platform-control \
            api-gateway=${{ env.DOCKER_REGISTRY }}/autoflow/api-gateway:${{ github.sha }}
          kubectl set image deployment/execution-worker -n platform-execution \
            execution-worker=${{ env.DOCKER_REGISTRY }}/autoflow/execution-service:${{ github.sha }}
          kubectl rollout status deployment/api-gateway -n platform-control --timeout=5m
          kubectl rollout status deployment/execution-worker -n platform-execution --timeout=5m

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
      - name: Deploy
        run: |
          kubectl set image deployment/api-gateway -n platform-control \
            api-gateway=${{ env.DOCKER_REGISTRY }}/autoflow/api-gateway:${{ github.ref_name }}
          kubectl set image deployment/execution-worker -n platform-execution \
            execution-worker=${{ env.DOCKER_REGISTRY }}/autoflow/execution-service:${{ github.ref_name }}
          kubectl rollout status deployment/api-gateway -n platform-control --timeout=5m
          kubectl rollout status deployment/execution-worker -n platform-execution --timeout=5m
